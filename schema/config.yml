          pickup_point_name:
            type: "varchar"
          pickup_point_type:
            type: "varchar"
          country:
            type: "varchar"
          region:
            type: "varchar"
          city:
            type: "varchar"
          street_address:
            type: "varchar"
          postal_code:
            type: "varchar"
          is_active:
            type: "boolean"
          max_capacity_packages:
            type: "integer"
          operating_hours:
            type: "varchar"
          contact_phone:
            type: "varchar"
          partner_name:
            type: "varchar"
          effective_from:
            type: "timestamp"
            scd2: true
          effective_to:
            type: "timestamp"
            scd2: true
          is_current:
            type: "boolean"
