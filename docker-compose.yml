services:

  # ETCD cluster (Patroni)
  etcd1:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd1
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd1
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd1:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd1:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd1_data:/etcd-data
    networks: [pgnet]

  etcd2:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd2
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd2
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd2:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd2:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd2_data:/etcd-data
    networks: [pgnet]

  etcd3:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd3
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd3
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd3:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd3_data:/etcd-data
    networks: [pgnet]

  # Patroni cluster
  patroni-primary:
    image: ghcr.io/zalando/spilo-15:3.2-p1
    container_name: patroni-primary
    environment:
       SPILO_CONFIGURATION: |
         scope: marketplace
         name: patroni-primary
 
         restapi:
           listen: 0.0.0.0:8008
           connect_address: patroni-primary:8008
 
         etcd:
           hosts:
             - etcd1:2379
             - etcd2:2379
             - etcd3:2379
 
         bootstrap:
           dcs:
             ttl: 30
             loop_wait: 10
             retry_timeout: 10
             postgresql:
               use_pg_rewind: true
               use_slots: true
               parameters:
                 wal_level: logical
                 max_wal_senders: 10
                 max_replication_slots: 10
                 max_connections: 200
                 wal_log_hints: 'on'
                 hot_standby: 'on'
 
         postgresql:
           listen: 0.0.0.0:5432
           connect_address: patroni-primary:5432
           data_dir: /home/postgres/pgdata/pgroot/data
           authentication:
             superuser:
               username: postgres
               password: postgres
             replication:
               username: replicator
               password: replicator_pass
           pg_hba:
            - "local   replication     replicator                            trust"
            - "local   all             all                                   trust"
            - "host    all             all             127.0.0.1/32           md5"
            - "host    all             all             ::1/128                md5"
        
            - "host    replication     replicator      172.16.0.0/12          md5"
            - "hostssl replication     replicator      172.16.0.0/12          md5"
        
            - "host    all             all             172.16.0.0/12          md5"
            - "hostssl all             all             172.16.0.0/12          md5"

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - spilo_primary_data:/home/postgres/pgdata
      - ./initdb:/initdb:ro
    networks: [pgnet]
    depends_on: [etcd1, etcd2, etcd3]

  patroni-replica:
    image: ghcr.io/zalando/spilo-15:3.2-p1
    container_name: patroni-replica
    environment:
       SPILO_CONFIGURATION: |
         scope: marketplace
         name: patroni-replica
 
         restapi:
           listen: 0.0.0.0:8008
           connect_address: patroni-replica:8008
 
         etcd:
           hosts:
             - etcd1:2379
             - etcd2:2379
             - etcd3:2379
 
         postgresql:
           listen: 0.0.0.0:5432
           connect_address: patroni-replica:5432
           data_dir: /home/postgres/pgdata/pgroot/data
           authentication:
             superuser:
               username: postgres
               password: postgres
             replication:
               username: replicator
               password: replicator_pass
           pg_hba:
            - "local   replication     replicator                            trust"
            - "local   all             all                                   trust"
            - "host    all             all             127.0.0.1/32           md5"
            - "host    all             all             ::1/128                md5"
        
            # ВАЖНО: разрешаем физическую репликацию для pg_basebackup
            - "host    replication     replicator      172.16.0.0/12          md5"
            - "hostssl replication     replicator      172.16.0.0/12          md5"
        
            # Разрешаем обычные подключения в docker-сети
            - "host    all             all             172.16.0.0/12          md5"
            - "hostssl all             all             172.16.0.0/12          md5"

    volumes:
      - spilo_replica_data:/home/postgres/pgdata
    networks: [pgnet]
    depends_on:
      patroni-primary:
        condition: service_healthy

  haproxy:
    image: haproxy:2.9
    container_name: haproxy
    ports:
      - "5432:5432"   # primary
      - "6432:6432"   # replica/analytics
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on: [patroni-primary, patroni-replica]
    networks: [pgnet]

  db-init:
    image: postgres:15-alpine
    container_name: db-init
    depends_on: [haproxy]
    networks: [pgnet]
    volumes:
      - ./initdb:/initdb:ro
    environment:
      PGPASSWORD: postgres
    restart: "no"
    command: >
      bash -lc "
        set -euo pipefail;

        echo 'Waiting for primary...';
        until pg_isready -h haproxy -p 5432 -U postgres; do sleep 1; done;

        echo 'Check DB role...';
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -Atc 'select pg_is_in_recovery();' | grep -qx 'f';

        echo 'Create databases...';
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/source/00-create-databases.sql;

        echo 'Create tables...';
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/source/user_service_db.sql;
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/source/order_service_db.sql;
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/source/logistics_service_db.sql;
      
        echo 'Create debezium role...';
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/source/99-debezium.sql;
      
        echo 'DB init done.';
      "

  # ZooKeeper (kafka debezium)
  zookeeper1:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper1
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper1:2888:3888;zookeeper2:2888:3888;zookeeper3:2888:3888
    networks: [pgnet]

  zookeeper2:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper2
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper1:2888:3888;zookeeper2:2888:3888;zookeeper3:2888:3888
    networks: [pgnet]

  zookeeper3:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper3
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper1:2888:3888;zookeeper2:2888:3888;zookeeper3:2888:3888
    networks: [pgnet]

  # Kafka for debezium
  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    depends_on: [zookeeper1, zookeeper2, zookeeper3]
    networks: [pgnet]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka2
    depends_on: [zookeeper1, zookeeper2, zookeeper3]
    networks: [pgnet]
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  # Debezium
  debezium:
    image: quay.io/debezium/connect:2.7
    container_name: debezium
    depends_on:
      - kafka1
      - kafka2
      - haproxy
      - db-init
    networks: [pgnet]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    volumes:
      - ./debezium:/debezium:ro

  debezium-init:
    image: alpine:3.20
    container_name: debezium-init
    depends_on:
      - debezium
    networks: [pgnet]
    volumes:
      - ./debezium:/debezium:ro
    entrypoint: ["/bin/sh", "/debezium/init-connectors.sh"]

  # S3 (minio)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    networks: [pgnet]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-init
    networks: [pgnet]
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./minio/minio-init.sh:/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/minio-init.sh"]
    restart: "no"

  # Iceberg
  iceberg-rest-db:
    image: postgres:15-alpine
    container_name: iceberg-rest-db
    networks: [pgnet]
    environment:
      POSTGRES_DB: iceberg
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
    volumes:
      - iceberg_rest_db_data:/var/lib/postgresql/data

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    networks: [pgnet]
    depends_on:
      minio-init:
        condition: service_completed_successfully
      iceberg-rest-db:
        condition: service_started
    ports:
      - "8181:8181"
    environment:
      CATALOG_PORT: "8181"

      CATALOG_JDBC_URI: "jdbc:postgresql://iceberg-rest-db:5432/iceberg"
      CATALOG_JDBC_USER: "iceberg"
      CATALOG_JDBC_PASSWORD: "iceberg"

      CATALOG_IO__IMPL: "org.apache.iceberg.aws.s3.S3FileIO"
      CATALOG_WAREHOUSE: "s3://staging/warehouse"

      CATALOG_S3_ENDPOINT: "http://minio:9000"
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: "minio"
      CATALOG_S3_SECRET__ACCESS__KEY: "minio12345"
      CATALOG_S3_REGION: "us-east-1"

      AWS_ACCESS_KEY_ID: "minio"
      AWS_SECRET_ACCESS_KEY: "minio12345"
      AWS_REGION: "us-east-1"

  # Trino
  trino:
    image: trinodb/trino:451
    container_name: trino
    networks: [pgnet]
    ports:
      - "8088:8080"
    volumes:
      - ./trino/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    depends_on:
      - iceberg-rest
      - minio

  trino-init:
    image: trinodb/trino:451
    container_name: trino-init
    networks: [pgnet]
    depends_on:
      - trino
    volumes:
      - ./initdb/staging:/initdb/staging:ro
      - ./initdb/detailed:/initdb/detailed:ro
      - ./trino/trino-init.sh:/trino-init.sh:ro
    entrypoint: ["/bin/sh", "/trino-init.sh"]
    restart: "no"

  # DMP debezium -> staging
  dmp-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.dmp-service
    container_name: dmp-service
    networks: [pgnet]
    depends_on:
      - kafka1
      - kafka2
      - trino
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_CONNECT_TIMEOUT_SEC: "300"
      KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092,kafka2:9092"
      KAFKA_GROUP_ID: "dmp-service"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      KAFKA_TOPICS: "user_service.public.users,user_service.public.user_addresses,user_service.public.user_status_history,order_service.public.orders,order_service.public.products,order_service.public.order_items,order_service.public.order_status_history,logistics_service.public.warehouses,logistics_service.public.pickup_points,logistics_service.public.shipments,logistics_service.public.shipment_movements,logistics_service.public.shipment_status_history"
      TRINO_HOST: "trino"
      TRINO_PORT: "8080"
      TRINO_USER: "dmp"
      TRINO_CATALOG: "iceberg"
      BATCH_SIZE: "200"
      FLUSH_INTERVAL_SEC: "3"
      SCHEMA_CONFIG_PATH: "/schema/config.yml"
    volumes:
      - ./schema/config.yml:/schema/config.yml:ro
    restart: unless-stopped

networks:
  pgnet:

volumes:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  spilo_primary_data:
  spilo_replica_data:
  minio_data:
  iceberg_rest_db_data: