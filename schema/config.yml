version: 1

tech_cols:
  staging:
    __op:
      type: "varchar"
    __ts_ms:
      type: "bigint"
    __kafka_topic:
      type: "varchar"
    __kafka_partition:
      type: "int"
    __kafka_offset:
      type: "bigint"
    __ingest_dts:
      type: "timestamp"
    __record_source:
      type: "varchar"

sources:
  - database: user_service_db
    schema: public
    tables:
      - name: users
        columns:
          user_id:
            type: "serial"
            pk: true
          user_external_id:
            type: "uuid"
            bk: true
          email:
            type: "varchar"
          first_name:
            type: "varchar"
          last_name:
            type: "varchar"
          phone:
            type: "varchar"
          date_of_birth:
            type: "date"
          registration_date:
            type: "timestamp"
          status:
            type: "varchar"
          effective_from:
            type: "timestamp"
            scd2: true
          effective_to:
            type: "timestamp"
            scd2: true
          is_current:
            type: "boolean"
            scd2: true
          created_at:
            type: "timestamp"
          updated_at:
            type: "timestamp"
          created_by:
            type: "varchar"
          updated_by:
            type: "varchar"

      - name: user_addresses
        columns:
          address_id:
            type: "serial"
            pk: true
          address_external_id:
            type: "uuid"
            bk: true
          user_external_id:
            type: "uuid"
            ref: "user_service_db.users.user_external_id"
          address_type:
            type: "varchar"
          country:
            type: "varchar"
          region:
            type: "varchar"
          city:
            type: "varchar"
          street_address:
            type: "varchar"
          postal_code:
            type: "varchar"
          apartment:
            type: "varchar"
          is_default:
            type: "boolean"
          effective_from:
            type: "timestamp"
            scd2: true
          effective_to:
            type: "timestamp"
            scd2: true
          is_current:
            type: "boolean"
            scd2: true
          created_at:
            type: "timestamp"
          updated_at:
            type: "timestamp"
          created_by:
            type: "varchar"
          updated_by:
            type: "varchar"

      - name: user_status_history
        columns:
          history_id:
            type: "serial"
            pk: true
          user_external_id:
            type: "uuid"
            ref: "user_service_db.users.user_external_id"
          old_status:
            type: "varchar"
          new_status:
            type: "varchar"
          change_reason:
            type: "varchar"
          changed_at:
            type: "timestamp"
          changed_by:
            type: "varchar"
          session_id:
            type: "varchar"
          ip_address:
            type: "inet"
          user_agent:
            type: "text"

  - database: order_service_db
