            type: "serial"
            pk: true
          shipment_external_id:
            type: "uuid"
            ref: "logistics_service_db.shipments.shipment_external_id"
          old_status:
            type: "varchar"
          new_status:
            type: "varchar"
          change_reason:
            type: "varchar"
          changed_at:
            type: "timestamp"
          changed_by:
            type: "varchar"
          location_type:
            type: "varchar"
          location_code:
            type: "varchar"
          notes:
            type: "text"
          customer_notified:
            type: "boolean"

detailed_dv2:
  hubs:
    - name: hub_user
      source_table: user_service_db.users
      bk: [user_external_id]

    - name: hub_address
      source_table: user_service_db.user_addresses
      bk: [address_external_id]

    - name: hub_order
      source_table: order_service_db.orders
      bk: [order_external_id]

    - name: hub_product
      source_table: order_service_db.products
      bk: [product_sku]

    - name: hub_shipment
      source_table: logistics_service_db.shipments
      bk: [shipment_external_id]

    - name: hub_warehouse
      source_table: logistics_service_db.warehouses
      bk: [warehouse_code]

    - name: hub_pickup_point
      source_table: logistics_service_db.pickup_points
      bk: [pickup_point_code]

  satellites:
    - name: sat_user
      hub: hub_user
      source_table: user_service_db.users

    - name: sat_address
      hub: hub_address
      source_table: user_service_db.user_addresses

    - name: sat_order
      hub: hub_order
      source_table: order_service_db.orders

    - name: sat_product
      hub: hub_product
      source_table: order_service_db.products

    - name: sat_shipment
      hub: hub_shipment
      source_table: logistics_service_db.shipments

    - name: sat_warehouse
      hub: hub_warehouse
      source_table: logistics_service_db.warehouses

    - name: sat_pickup_point
      hub: hub_pickup_point
      source_table: logistics_service_db.pickup_points

  links:
    - name: lnk_order_user
      source_table: order_service_db.orders
      left_hub: hub_order
      right_hub: hub_user
      left_bk: [order_external_id]
      right_bk: [user_external_id]

    - name: lnk_address_user
      source_table: user_service_db.user_addresses
      left_hub: hub_address
      right_hub: hub_user
      left_bk: [address_external_id]
      right_bk: [user_external_id]

    - name: lnk_order_address
      source_table: order_service_db.orders
      left_hub: hub_order
      right_hub: hub_address
      left_bk: [order_external_id]
      right_bk: [delivery_address_external_id]

    - name: lnk_shipment_order
      source_table: logistics_service_db.shipments
      left_hub: hub_shipment
      right_hub: hub_order
      left_bk: [shipment_external_id]
      right_bk: [order_external_id]

    - name: lnk_shipment_warehouse
      source_table: logistics_service_db.shipments
      left_hub: hub_shipment
      right_hub: hub_warehouse
      left_bk: [shipment_external_id]
      right_bk: [origin_warehouse_code]

    - name: lnk_shipment_pickup_point
      source_table: logistics_service_db.shipments
      left_hub: hub_shipment
      right_hub: hub_pickup_point
      left_bk: [shipment_external_id]
      right_bk: [destination_pickup_point_code]