            type: "uuid"
            ref: "user_service_db.users.user_external_id"
          order_number:
            type: "varchar"
          order_date:
            type: "timestamp"
          status:
            type: "varchar"
          subtotal:
            type: "decimal"
          tax_amount:
            type: "decimal"
          shipping_cost:
            type: "decimal"
          discount_amount:
            type: "decimal"
          total_amount:
            type: "decimal"
          currency:
            type: "varchar"
          delivery_address_external_id:
            type: "uuid"
            ref: "user_service_db.user_addresses.address_external_id"
          delivery_type:
            type: "varchar"
          expected_delivery_date:
            type: "date"
          actual_delivery_date:
            type: "date"
          payment_method:
            type: "varchar"
          payment_status:
            type: "varchar"
          effective_from:
            type: "timestamp"
            scd2: true
          effective_to:
            type: "timestamp"
            scd2: true
          is_current:
            type: "boolean"
            scd2: true
          created_at:
            type: "timestamp"
          updated_at:
            type: "timestamp"
          created_by:
            type: "varchar"
          updated_by:
            type: "varchar"

      - name: products
        columns:
          product_id:
            type: "serial"
            pk: true
          product_sku:
            type: "varchar"
            bk: true
          product_name:
            type: "varchar"
          category:
            type: "varchar"
          brand:
            type: "varchar"
          price:
            type: "decimal"
          currency:
            type: "varchar"
          weight_grams:
            type: "integer"
          dimensions_length_cm:
            type: "decimal"
          dimensions_width_cm:
            type: "decimal"
          dimensions_height_cm:
            type: "decimal"
          is_active:
            type: "boolean"
          effective_from:
            type: "timestamp"
            scd2: true
          effective_to:
            type: "timestamp"
            scd2: true
          is_current:
            type: "boolean"
            scd2: true
          created_at:
            type: "timestamp"
          updated_at:
            type: "timestamp"
          created_by:
            type: "varchar"
          updated_by:
            type: "varchar"

      - name: order_items
        columns:
          order_item_id:
            type: "serial"
            pk: true
          order_external_id:
            type: "uuid"
            ref: "order_service_db.orders.order_external_id"
          product_sku:
            type: "varchar"
            ref: "order_service_db.products.product_sku"
          quantity:
            type: "integer"
          unit_price:
            type: "decimal"
          total_price:
            type: "decimal"
          product_name_snapshot:
            type: "varchar"
          product_category_snapshot:
            type: "varchar"
          product_brand_snapshot:
            type: "varchar"
          created_at:
            type: "timestamp"
          updated_at:
            type: "timestamp"
          created_by:
            type: "varchar"
          updated_by:
            type: "varchar"

      - name: order_status_history
        columns:
          history_id:
            type: "serial"
            pk: true
          order_external_id:
            type: "uuid"
            ref: "order_service_db.orders.order_external_id"
          old_status:
            type: "varchar"
          new_status:
            type: "varchar"
          change_reason:
            type: "varchar"
          changed_at:
            type: "timestamp"
          changed_by:
            type: "varchar"
          session_id:
            type: "varchar"
          ip_address:
            type: "inet"
          notes:
            type: "text"

  - database: logistics_service_db
    schema: public
    tables:
      - name: warehouses
        columns:
          warehouse_id:
            type: "serial"
            pk: true
          warehouse_code:
            type: "varchar"
            bk: true
          warehouse_name:
            type: "varchar"
          warehouse_type:
            type: "varchar"
          country:
            type: "varchar"
          region:
            type: "varchar"
          city:
            type: "varchar"
